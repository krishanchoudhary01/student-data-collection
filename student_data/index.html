<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marksheet Portal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;min-height:100vh;padding:2rem 1rem;color:#1a1a1a}
  .page{max-width:680px;margin:0 auto}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
  .logo-icon{width:38px;height:38px;border-radius:10px;background:#fff;border:0.5px solid #e0e0dc;display:flex;align-items:center;justify-content:center}
  .logo-title{font-size:16px;font-weight:600;color:#1a1a1a}
  .logo-sub{font-size:12px;color:#888}
  .card{background:#fff;border:0.5px solid #e0e0dc;border-radius:14px;padding:1.75rem}
  h2{font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
  .sub{font-size:13px;color:#888;margin-bottom:1.25rem}
  label{display:block;font-size:13px;color:#555;margin-bottom:4px;margin-top:14px}
  input,select{width:100%;padding:9px 12px;border:0.5px solid #d0d0cc;border-radius:8px;font-size:14px;color:#1a1a1a;background:#fff;outline:none;transition:border 0.15s}
  input:focus,select:focus{border-color:#888}
  input[readonly]{opacity:0.55;cursor:not-allowed}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  @media(max-width:480px){.grid2,.grid3{grid-template-columns:1fr 1fr}}
  .btn{margin-top:1.25rem;width:100%;padding:10px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:0.5px solid #d0d0cc;background:#f5f5f3;color:#1a1a1a;transition:background 0.15s}
  .btn:hover{background:#e8e8e5}
  .btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .btn-primary:hover{background:#333}
  .btn-sm{width:auto;padding:7px 14px;font-size:13px;margin-top:0}
  .btn-danger{color:#c0392b;border-color:#f5c6c6}
  .btn-danger:hover{background:#fff0f0}
  .err{font-size:12px;color:#c0392b;margin-top:8px;min-height:16px}
  .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
  .badge-pass{background:#e8f5e9;color:#2e7d32}
  .badge-atkt{background:#fff8e1;color:#f57f17}
  .section-head{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.06em;margin-top:1.5rem;margin-bottom:2px;padding-bottom:8px;border-bottom:0.5px solid #e8e8e5}
  .toast{position:fixed;bottom:1.25rem;right:1.25rem;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999}
  .toast.show{opacity:1}
  .top-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem}
  .link-btn{font-size:12px;color:#888;cursor:pointer;background:none;border:none;padding:0;text-decoration:underline;margin-top:2px}
  .link-btn:hover{color:#1a1a1a}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:1rem}
  th{font-size:11px;font-weight:600;color:#aaa;text-align:left;padding:7px 8px;border-bottom:0.5px solid #e8e8e5}
  td{padding:7px 8px;border-bottom:0.5px solid #f0f0ee;color:#1a1a1a;vertical-align:middle}
  .empty{text-align:center;padding:2.5rem;color:#bbb;font-size:13px}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:0.5rem}
  .stat{display:inline-block;background:#f5f5f3;border:0.5px solid #e0e0dc;border-radius:8px;padding:6px 14px;font-size:13px;color:#555;margin-bottom:1rem}
  .stat span{font-weight:600;color:#1a1a1a}
  .overflow{overflow-x:auto}
</style>
</head>
<body>

<div class="page" id="app">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-school" style="font-size:20px;color:#555"></i></div>
    <div>
      <div class="logo-title">Marksheet Portal</div>
      <div class="logo-sub">Student Result Management</div>
    </div>
  </div>
  <div id="screen-login"></div>
  <div id="screen-form" style="display:none"></div>
  <div id="screen-admin" style="display:none"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const ADMIN_ENROLLMENT = "24BCA53001";
const SESSIONS = ["2024-25","2025-26","2026-27"];
const SEMS = ["Sem 1","Sem 2","Sem 3","Sem 4","Sem 5","Sem 6"];

function getRecords(){
  try{return JSON.parse(localStorage.getItem("mkrecords")||"[]")}catch{return[]}
}
function saveRecords(r){localStorage.setItem("mkrecords",JSON.stringify(r))}

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

function show(id){
  ["screen-login","screen-form","screen-admin"].forEach(s=>{
    document.getElementById(s).style.display="none";
  });
  document.getElementById(id).style.display="block";
}

/* ── LOGIN ── */
function renderLogin(){
  document.getElementById("screen-login").innerHTML=`
  <div class="card">
    <h2>Sign in</h2>
    <p class="sub">Enter your enrollment number to continue</p>
    <label>Enrollment number</label>
    <input id="li-enroll" placeholder="e.g. 24BCA53002" maxlength="20" onkeydown="if(event.key==='Enter')doLogin()"/>
    <label>Password &nbsp;<span style="font-size:11px;color:#bbb">(last 4 digits of enrollment)</span></label>
    <input id="li-pass" type="password" placeholder="****" maxlength="4" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="err" id="li-err"></div>
    <button class="btn btn-primary" onclick="doLogin()">Sign in</button>
    <div style="margin-top:12px;text-align:center">
      <button class="link-btn" onclick="showAdminLogin()">Admin access →</button>
    </div>
  </div>`;
  show("screen-login");
}

function doLogin(){
  const enroll=document.getElementById("li-enroll").value.trim().toUpperCase();
  const pass=document.getElementById("li-pass").value.trim();
  const err=document.getElementById("li-err");
  if(!enroll||!pass){err.textContent="Both fields are required.";return}
  if(pass!==enroll.slice(-4)){err.textContent="Wrong password. Use last 4 digits of your enrollment.";return}
  err.textContent="";
  renderForm(enroll);
}

/* ── STUDENT FORM ── */
function renderForm(enroll){
  const semInputs=SEMS.map((s,i)=>`
    <div>
      <label>${s} CGPA <span style="font-size:11px;color:#bbb">(Opt)</span></label>
      <input id="cgpa${i}" type="number" step="0.01" min="0" max="10" placeholder="0.00"/>
    </div>`).join("");

  document.getElementById("screen-form").innerHTML=`
  <div class="card">
    <div class="top-bar">
      <div><h2>Student marksheet</h2><p class="sub">Fill all details carefully</p></div>
      <button class="link-btn" onclick="renderLogin()">← Back</button>
    </div>
    <div class="section-head">Personal info</div>
    <label>Enrollment number</label>
    <input id="f-enroll" value="${enroll}" readonly/>
    <label>Student name</label>
    <input id="f-name" placeholder="Full name"/>
    <div class="grid2">
      <div>
        <label>Session</label>
        <select id="f-session">${SESSIONS.map(s=>`<option>${s}</option>`).join("")}</select>
      </div>
      <div>
        <label>Result status</label>
        <select id="f-result">
          <option value="Pass">Pass</option>
          <option value="ATKT/Repeater">ATKT/Repeater</option>
        </select>
      </div>
    </div>
    <div class="section-head">Semester CGPA</div>
    <div class="grid3" style="margin-top:8px">${semInputs}</div>
    <div class="err" id="f-err"></div>
    <button class="btn btn-primary" onclick="submitForm('${enroll}')">
      <i class="ti ti-check"></i> Submit record
    </button>
  </div>`;
  show("screen-form");
}

function submitForm(enroll){
  const name=document.getElementById("f-name").value.trim();
  const session=document.getElementById("f-session").value;
  const result=document.getElementById("f-result").value;
  const err=document.getElementById("f-err");
  if(!name){err.textContent="Student name is required.";return}
  
  const cgpas={};let valid=true;
  SEMS.forEach((s,i)=>{
    const rawVal=document.getElementById(`cgpa${i}`).value.trim();
    if(rawVal!==""){
      const v=parseFloat(rawVal);
      if(isNaN(v)||v<0||v>10){valid=false;}
      else cgpas[s]=v.toFixed(2);
    }else{
      cgpas[s]=""; // Stored as empty if the student hasn't reached/completed this semester yet
    }
  });
  
  if(!valid){err.textContent="Enter valid CGPA (0.00–10.00) for completed semesters.";return}
  err.textContent="";
  
  const records=getRecords();
  const rec={
    enrollment:enroll,name,session,result,...cgpas,
    submittedAt:new Date().toLocaleString("en-IN")
  };
  records.push(rec);
  saveRecords(records);
  
  toast("Record submitted successfully!");
  setTimeout(()=>renderLogin(),800);
}

/* ── ADMIN LOGIN ── */
function showAdminLogin(){
  document.getElementById("screen-admin").innerHTML=`
  <div class="card">
    <div class="top-bar">
      <div><h2>Admin access</h2><p class="sub">Restricted to authorized enrollment only</p></div>
      <button class="link-btn" onclick="renderLogin()">← Back</button>
    </div>
    <label>Admin enrollment number</label>
    <input id="adm-enroll" placeholder="Your enrollment number" maxlength="20" onkeydown="if(event.key==='Enter')doAdminLogin()"/>
    <label>Password &nbsp;<span style="font-size:11px;color:#bbb">(last 4 digits)</span></label>
    <input id="adm-pass" type="password" placeholder="****" maxlength="4" onkeydown="if(event.key==='Enter')doAdminLogin()"/>
    <div class="err" id="adm-err"></div>
    <button class="btn btn-primary" onclick="doAdminLogin()">Access admin panel</button>
  </div>`;
  show("screen-admin");
}

function doAdminLogin(){
  const enroll=document.getElementById("adm-enroll").value.trim().toUpperCase();
  const pass=document.getElementById("adm-pass").value.trim();
  const err=document.getElementById("adm-err");
  if(enroll!==ADMIN_ENROLLMENT){err.textContent="Access denied. Not an admin account.";return}
  if(pass!==enroll.slice(-4)){err.textContent="Wrong password.";return}
  err.textContent="";
  renderAdminPanel();
}

/* ── ADMIN PANEL ── */
function renderAdminPanel(){
  const records=getRecords();
  const rows=records.length
    ? records.map((r,i)=>`
      <tr>
        <td>${r.enrollment}</td>
        <td>${r.name}</td>
        <td>${r.session}</td>
        <td style="font-size:12px;color:#888">${SEMS.map(s=>r[s]||"—").join(" / ")}</td>
        <td><span class="badge ${r.result==="Pass"?"badge-pass":"badge-atkt"}">${r.result}</span></td>
        <td style="font-size:12px;color:#aaa">${r.submittedAt}</td>
        <td><button class="link-btn" style="color:#c0392b" onclick="deleteRecord(${i})">Delete</button></td>
      </tr>`).join("")
    : `<tr><td colspan="7"><div class="empty">No records yet</div></td></tr>`;

  document.getElementById("screen-admin").innerHTML=`
  <div class="card">
    <div class="top-bar">
      <div><h2>Admin panel</h2><p class="sub">All submitted records</p></div>
      <button class="link-btn" onclick="renderLogin()">← Logout</button>
    </div>
    <div class="stat">Total records: <span>${records.length}</span></div>
    <div class="actions">
      <button class="btn btn-sm btn-primary" onclick="downloadAllCSV()">
        <i class="ti ti-download"></i> Download all CSV
      </button>
      <button class="btn btn-sm" onclick="downloadAllCSV()" style="display:none"></button>
      <button class="btn btn-sm btn-danger" onclick="clearRecords()">
        <i class="ti ti-trash"></i> Clear all records
      </button>
    </div>
    <div class="overflow">
      <table>
        <thead><tr>
          <th>Enrollment</th><th>Name</th><th>Session</th>
          <th>CGPA (S1–S6)</th><th>Result</th><th>Submitted</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
  show("screen-admin");
}

function deleteRecord(index){
  if(!confirm("Delete this record?"))return;
  const records=getRecords();
  records.splice(index,1);
  saveRecords(records);
  toast("Record deleted.");
  renderAdminPanel();
}

function downloadAllCSV(){
  const records=getRecords();
  if(!records.length){toast("No records to download.");return}
  const headers=["Enrollment","Name","Session",...SEMS.map(s=>s+" CGPA"),"Result","Submitted At"];
  const rowsCSV=records.map(r=>
    [r.enrollment,r.name,r.session,...SEMS.map(s=>r[s]||""),r.result,r.submittedAt]
    .map(v=>`"${String(v).replace(/"/g,'""')}"`)
    .join(",")
  );
  triggerDownload([headers.join(","),...rowsCSV].join("\n"),"all_marksheets.csv");
  toast("All records downloaded.");
}

function clearRecords(){
  if(!confirm("Delete ALL records permanently? This cannot be undone."))return;
  saveRecords([]);
  toast("All records cleared.");
  renderAdminPanel();
}

function triggerDownload(content,filename){
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(content);
  a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

renderLogin();
</script>
</body>
</html>
